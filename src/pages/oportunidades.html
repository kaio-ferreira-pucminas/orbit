<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oportunidades Recomendadas — Orbit</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Manrope:wght@700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="../styles/oportunidades.css" />
</head>
<body>

  <!-- =====================================================
       SIDEBAR ESQUERDA (usuário)
  ====================================================== -->
  <div id="orbit-sidebar"></div>

  <!-- =====================================================
       CONTEÚDO
  ====================================================== -->
  <main class="opp-main">
    <header class="opp-header">
      <span class="opp-header__eyebrow">MATCH DE CARREIRA</span>
      <h1 class="opp-header__title">Oportunidades Orbitais</h1>
      <p class="opp-header__subtitle">
        Selecionamos vagas que orbitam exatamente o seu stack tecnológico atual e seus objetivos de crescimento.
      </p>
    </header>

    <!-- Barra de filtros -->
    <section class="opp-filters" aria-label="Filtros">
      <div class="opp-search">
        <svg class="opp-search__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="search" id="filter-search" class="opp-search__input" placeholder="Buscar vagas, empresas ou tecnologias..." aria-label="Buscar" />
      </div>
      <select id="filter-tech" class="opp-select" aria-label="Tech Stack"><option value="">Tech Stack</option></select>
      <select id="filter-level" class="opp-select" aria-label="Senioridade">
        <option value="">Senioridade</option>
        <option value="Júnior">Júnior</option>
        <option value="Pleno">Pleno</option>
        <option value="Sênior">Sênior</option>
      </select>
      <select id="filter-modality" class="opp-select" aria-label="Regime">
        <option value="">Regime</option>
        <option value="Remoto">Remoto</option>
        <option value="Híbrido">Híbrido</option>
        <option value="Presencial">Presencial</option>
      </select>
    </section>

    <p class="opp-results-count" id="results-count" aria-live="polite"></p>

    <section class="opp-grid" id="opp-grid" aria-label="Oportunidades recomendadas">
      <div class="opp-loading">Carregando recomendações...</div>
    </section>
  </main>

  <script src="../scripts/config.js"></script>
  <script src="../scripts/toast.js"></script>
  <script src="../scripts/sidebar.js"></script>
  <script src="../scripts/oportunidades.js"></script>
  <script src="../scripts/orbit-select.js"></script>
</body>
</html>
