<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Candidatos da Vaga — Orbit</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Manrope:wght@700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="../styles/empresa-candidatos.css" />
</head>
<body>

  <!-- =====================================================
       SIDEBAR EMPRESA
  ====================================================== -->
  <aside class="emp-sidebar" aria-label="Menu lateral da empresa">
    <a href="/pages/profile.html" class="emp-sidebar__brand emp-sidebar__brand--link" title="Ver meu perfil">
      <div class="emp-sidebar__logo-icon" aria-hidden="true">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="12" r="9" stroke="white" stroke-width="2"/>
          <circle cx="12" cy="12" r="3" fill="white"/>
          <path d="M3 12 Q7 6 12 12 Q17 18 21 12" stroke="white" stroke-width="1.5" fill="none"/>
        </svg>
      </div>
      <div class="emp-sidebar__brand-text">
        <span class="emp-sidebar__brand-name" id="sidebar-company-name">Orbit Corp</span>
        <span class="emp-sidebar__brand-sub">RECRUTAMENTO ATIVO</span>
      </div>
    </a>

    <nav class="emp-sidebar__nav" aria-label="Navegação da empresa">
      <a href="/pages/empresa-dashboard.html" class="emp-nav__link">
        <svg class="emp-nav__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        <span>Dashboard</span>
      </a>
      <a href="/pages/feed.html" class="emp-nav__link">
        <svg class="emp-nav__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span>Feed</span>
      </a>
      <a href="/pages/empresa-talentos.html" class="emp-nav__link">
        <svg class="emp-nav__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <span>Busca de Talentos</span>
      </a>
      <a href="/pages/empresa-candidatos.html" class="emp-nav__link emp-nav__link--active" aria-current="page">
        <svg class="emp-nav__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
        <span>Gerenciar Vagas</span>
      </a>
      <a href="/pages/mensagens.html" class="emp-nav__link">
        <svg class="emp-nav__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <span>Mensagens</span>
      </a>
    </nav>

    <div class="emp-sidebar__bottom">
      <div class="emp-sidebar__divider"></div>
      <button type="button" class="emp-nav__link emp-nav__link--btn" id="btn-logout">
        <svg class="emp-nav__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        <span>Sair</span>
      </button>
    </div>
  </aside>

  <!-- =====================================================
       CONTEÚDO
  ====================================================== -->
  <main class="cand-main">
    <a href="/pages/empresa-dashboard.html" class="cand-back">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      VOLTAR PARA VAGAS
    </a>

    <div class="cand-loading" id="cand-loading">Carregando candidatos...</div>

    <div id="cand-content" hidden>
      <!-- Header da vaga -->
      <header class="cand-head">
        <div class="cand-head__text">
          <h1 class="cand-head__title" id="cand-job-title">—</h1>
          <p class="cand-head__meta">
            <span id="cand-job-location">—</span> • <span class="accent" id="cand-job-count">0 Candidatos Aplicados</span>
          </p>
        </div>
        <div class="cand-head__actions">
          <select id="filter-status" class="cand-filter" aria-label="Filtrar por status">
            <option value="">Todos os status</option>
            <option value="enviada">Enviada</option>
            <option value="em_analise">Em Análise</option>
            <option value="entrevista">Entrevista</option>
            <option value="recusado">Recusado</option>
            <option value="contratado">Contratado</option>
            <option value="finalizado">Finalizado</option>
          </select>
        </div>
      </header>

      <!-- Funil -->
      <section class="cand-funnel" aria-label="Funil de candidatos">
        <div class="cand-funnel__card"><span class="cand-funnel__label">TOTAL</span><span class="cand-funnel__value" id="funnel-total">0</span></div>
        <div class="cand-funnel__card"><span class="cand-funnel__label">EM ANÁLISE</span><span class="cand-funnel__value cand-funnel__value--accent" id="funnel-analise">0</span></div>
        <div class="cand-funnel__card"><span class="cand-funnel__label">ENTREVISTAS</span><span class="cand-funnel__value cand-funnel__value--accent" id="funnel-entrevista">0</span></div>
        <div class="cand-funnel__card"><span class="cand-funnel__label">RECUSADOS</span><span class="cand-funnel__value cand-funnel__value--accent" id="funnel-recusado">0</span></div>
        <div class="cand-funnel__card"><span class="cand-funnel__label">CONTRATADOS</span><span class="cand-funnel__value cand-funnel__value--accent" id="funnel-contratado">0</span></div>
        <div class="cand-funnel__card"><span class="cand-funnel__label">FINALIZADOS</span><span class="cand-funnel__value cand-funnel__value--accent" id="funnel-finalizado">0</span></div>
      </section>

      <!-- Lista de candidatos -->
      <section class="cand-list" id="cand-list" aria-label="Candidatos"></section>
    </div>
  </main>

  <script src="../scripts/config.js"></script>
  <script src="../scripts/toast.js"></script>
  <script src="../scripts/empresa-candidatos.js"></script>
  <script src="../scripts/orbit-select.js"></script>
  <script src="../scripts/mobile-sidebar.js"></script>
</body>
</html>
