<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vagas — Orbit</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Manrope:wght@700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="../styles/vagas.css" />
</head>
<body>

  <!-- =====================================================
       SIDEBAR ESQUERDA (SideNavBar — usuário)
  ====================================================== -->
  <div id="orbit-sidebar"></div>

  <!-- =====================================================
       CONTEÚDO PRINCIPAL
  ====================================================== -->
  <main class="vagas-main">

    <!-- Hero -->
    <header class="vagas-hero">
      <h1 class="vagas-hero__title">Explore sua próxima órbita.</h1>
      <p class="vagas-hero__subtitle">
        Conectamos talentos em ascensão às melhores oportunidades do mercado de tecnologia brasileira.
      </p>
    </header>

    <!-- Barra de busca + filtros rápidos -->
    <section class="vagas-searchbar" aria-label="Busca e filtros">
      <div class="vagas-search">
        <svg class="vagas-search__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="search" id="filter-search" class="vagas-search__input" placeholder="Cargo, tecnologia ou empresa..." aria-label="Buscar vagas" />
      </div>
      <select id="filter-modality" class="vagas-select" aria-label="Tipo de vaga">
        <option value="">Tipo de Vaga</option>
        <option value="Remoto">Remoto</option>
        <option value="Híbrido">Híbrido</option>
        <option value="Presencial">Presencial</option>
      </select>
      <select id="filter-tech" class="vagas-select" aria-label="Tech Stack">
        <option value="">Tech Stack</option>
      </select>
      <select id="filter-level" class="vagas-select" aria-label="Senioridade">
        <option value="">Senioridade</option>
        <option value="Júnior">Júnior</option>
        <option value="Pleno">Pleno</option>
        <option value="Sênior">Sênior</option>
      </select>
    </section>

    <!-- Layout: filtros + lista -->
    <div class="vagas-layout">

      <!-- Aside: filtros avançados + vagas salvas -->
      <aside class="vagas-filters" aria-label="Filtros avançados">
        <h2 class="vagas-filters__title">Filtros Avançados</h2>

        <div class="vagas-filter-group">
          <span class="vagas-filter-group__label">MODALIDADE</span>
          <label class="vagas-check"><input type="checkbox" name="modality" value="Remoto" /> Remoto</label>
          <label class="vagas-check"><input type="checkbox" name="modality" value="Híbrido" /> Híbrido</label>
          <label class="vagas-check"><input type="checkbox" name="modality" value="Presencial" /> Presencial</label>
        </div>

        <div class="vagas-filter-group">
          <span class="vagas-filter-group__label">NÍVEL</span>
          <label class="vagas-check"><input type="checkbox" name="level" value="Júnior" /> Júnior</label>
          <label class="vagas-check"><input type="checkbox" name="level" value="Pleno" /> Pleno</label>
          <label class="vagas-check"><input type="checkbox" name="level" value="Sênior" /> Sênior</label>
        </div>

        <button type="button" class="vagas-filter-clear" id="btn-clear-filters">Limpar filtros</button>

        <div class="vagas-saved">
          <h3 class="vagas-saved__title">Vagas Salvas</h3>
          <div class="vagas-saved__list" id="saved-list">
            <p class="vagas-loading">Carregando...</p>
          </div>
        </div>
      </aside>

      <!-- Lista de vagas -->
      <section class="vagas-content" aria-label="Lista de vagas">
        <div class="vagas-content__head">
          <p class="vagas-content__count" id="results-count" aria-live="polite"></p>
          <div class="vagas-content__sort">
            <span class="vagas-content__sort-label">Ordenar por:</span>
            <select id="filter-sort" class="vagas-select vagas-select--sort" aria-label="Ordenar por">
              <option value="recent">Mais recentes</option>
              <option value="salary">Maior salário</option>
            </select>
          </div>
        </div>

        <div class="vagas-list" id="vagas-list">
          <div class="vagas-loading">Carregando oportunidades...</div>
        </div>
      </section>

    </div>
  </main>

  <script src="../scripts/config.js"></script>
  <script src="../scripts/toast.js"></script>
  <script src="../scripts/sidebar.js"></script>
  <script src="../scripts/vagas.js"></script>
  <script src="../scripts/orbit-select.js"></script>
</body>
</html>
