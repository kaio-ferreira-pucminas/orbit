<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meus Projetos — Orbit</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="../styles/meus-projetos.css" />
</head>
<body>

  <!-- =====================================================
       SIDEBAR ESQUERDA (usuário)
  ====================================================== -->
  <aside class="dash-sidebar" aria-label="Menu lateral">
    <div class="dash-sidebar__brand">
      <div class="dash-sidebar__logo-icon" aria-hidden="true">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="12" r="9" stroke="white" stroke-width="2"/>
          <circle cx="12" cy="12" r="3" fill="white"/>
          <path d="M3 12 Q7 6 12 12 Q17 18 21 12" stroke="white" stroke-width="1.5" fill="none"/>
        </svg>
      </div>
      <div class="dash-sidebar__brand-text">
        <span class="dash-sidebar__brand-name">Orbit</span>
        <span class="dash-sidebar__brand-sub">DEVELOPER PLATFORM</span>
      </div>
    </div>

    <nav class="dash-sidebar__nav" aria-label="Navegação principal">
      <a href="/pages/dashboard.html" class="dash-nav__link">
        <svg class="dash-nav__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        <span>Dashboard</span>
      </a>
      <a href="/pages/meus-projetos.html" class="dash-nav__link dash-nav__link--active" aria-current="page">
        <svg class="dash-nav__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        <span>Meus Projetos</span>
      </a>
      <a href="/pages/vagas.html" class="dash-nav__link">
        <svg class="dash-nav__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
        <span>Oportunidades</span>
      </a>
      <a href="/pages/mensagens.html" class="dash-nav__link">
        <svg class="dash-nav__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <span>Mensagens</span>
      </a>
    </nav>

    <div class="dash-sidebar__bottom">
      <button type="button" class="dash-sidebar__new-btn" id="btn-new-sidebar">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Novo Projeto
      </button>
      <div class="dash-sidebar__divider"></div>
      <button type="button" class="dash-nav__link dash-nav__link--btn" id="btn-logout">
        <svg class="dash-nav__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        <span>Sair</span>
      </button>
    </div>
  </aside>

  <!-- =====================================================
       CONTEÚDO
  ====================================================== -->
  <main class="mp-main">
    <header class="mp-header">
      <div class="mp-header__text">
        <span class="mp-header__eyebrow">PORTFÓLIO PESSOAL</span>
        <h1 class="mp-header__title">Mantenha sua órbita em <span>expansão.</span></h1>
        <p class="mp-header__subtitle" id="mp-subtitle">Continue construindo sua presença técnica no mercado.</p>
      </div>
      <select id="filter-status" class="mp-filter" aria-label="Filtrar por status">
        <option value="">Filtrar por Status</option>
        <option value="public">Públicos</option>
        <option value="private">Privados</option>
      </select>
    </header>

    <section class="mp-grid" id="mp-grid" aria-label="Lista de projetos">
      <div class="mp-loading">Carregando projetos...</div>
    </section>
  </main>

  <!-- =====================================================
       MODAL — Criar / Editar projeto
  ====================================================== -->
  <div class="mp-modal" id="proj-modal" hidden role="dialog" aria-modal="true" aria-labelledby="proj-modal-title">
    <div class="mp-modal__overlay" id="proj-modal-overlay"></div>
    <div class="mp-modal__dialog">
      <header class="mp-modal__header">
        <h2 class="mp-modal__title" id="proj-modal-title">Novo Projeto</h2>
        <button type="button" class="mp-modal__close" id="proj-modal-close" aria-label="Fechar">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </header>

      <form class="mp-form" id="proj-form">
        <input type="hidden" id="proj-id" />
        <label class="mp-field">
          <span class="mp-field__label">Título *</span>
          <input type="text" id="proj-title" required placeholder="Ex: Orbit System Design" />
        </label>
        <label class="mp-field">
          <span class="mp-field__label">Descrição</span>
          <textarea id="proj-desc" rows="3" placeholder="Descreva seu projeto..."></textarea>
        </label>
        <label class="mp-field">
          <span class="mp-field__label">Tecnologias (separadas por vírgula)</span>
          <input type="text" id="proj-tech" placeholder="React, Node.js, TypeScript" />
        </label>
        <div class="mp-form__row">
          <label class="mp-field">
            <span class="mp-field__label">Link do GitHub</span>
            <input type="url" id="proj-repo" placeholder="https://github.com/..." />
          </label>
          <label class="mp-field">
            <span class="mp-field__label">Demonstração (URL)</span>
            <input type="url" id="proj-demo" placeholder="https://..." />
          </label>
        </div>
        <label class="mp-field mp-field--inline">
          <input type="checkbox" id="proj-public" checked />
          <span class="mp-field__label">Projeto público</span>
        </label>

        <div class="mp-form__actions">
          <button type="button" class="mp-btn-text" id="proj-cancel">Cancelar</button>
          <button type="submit" class="mp-btn-primary" id="proj-submit">Salvar Projeto</button>
        </div>
      </form>
    </div>
  </div>

  <script src="../scripts/config.js"></script>
  <script src="../scripts/toast.js"></script>
  <script src="../scripts/meus-projetos.js"></script>
</body>
</html>
