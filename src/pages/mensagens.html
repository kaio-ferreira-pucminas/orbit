<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mensagens — Orbit</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Manrope:wght@700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="../styles/mensagens.css" />
</head>
<body>

  <!-- =====================================================
       SIDEBAR ESQUERDA (SideNavBar — componente de usuário)
  ====================================================== -->
  <div id="orbit-sidebar"></div>

  <!-- =====================================================
       CONTEÚDO — layout de mensagens (2 painéis)
  ====================================================== -->
  <main class="msg-main">

    <!-- Painel: lista de conversas -->
    <section class="msg-list-panel" aria-label="Conversas">
      <header class="msg-list-panel__header">
        <h1 class="msg-list-panel__title">Mensagens</h1>
        <button type="button" class="msg-new-btn" id="btn-new-conversation" aria-label="Nova mensagem" title="Nova mensagem">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 20h9"/>
            <path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/>
          </svg>
        </button>
      </header>

      <div class="msg-search">
        <svg class="msg-search__icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="search" id="conv-search" class="msg-search__input" placeholder="Buscar conversas..." aria-label="Buscar conversas" />
      </div>

      <div class="msg-list__subhead">
        <span class="msg-list__subhead-label">Recentes</span>
      </div>

      <ul class="msg-conv-list" id="conv-list" aria-label="Lista de conversas">
        <li class="msg-loading" id="conv-loading">Carregando conversas...</li>
      </ul>
    </section>

    <!-- Painel: conversa ativa -->
    <section class="msg-chat-panel" aria-label="Conversa" id="chat-panel">

      <!-- Estado vazio -->
      <div class="msg-chat-empty" id="chat-empty">
        <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        <p class="msg-chat-empty__title">Selecione uma conversa</p>
        <p class="msg-chat-empty__text">Escolha um contato à esquerda para ver o histórico de mensagens.</p>
      </div>

      <!-- Conversa carregada -->
      <div class="msg-chat" id="chat-active" hidden>
        <header class="msg-chat__header">
          <div class="msg-chat__contact">
            <div class="msg-chat__avatar" id="chat-avatar"><span id="chat-initials">?</span></div>
            <div class="msg-chat__contact-info">
              <span class="msg-chat__contact-name" id="chat-name">—</span>
              <span class="msg-chat__contact-status" id="chat-status">online</span>
            </div>
          </div>
        </header>

        <div class="msg-chat__history" id="chat-history" aria-live="polite">
          <!-- Bolhas injetadas via JS -->
        </div>

        <form class="msg-chat__composer" id="chat-composer">
          <input type="text" id="chat-input" class="msg-chat__input" placeholder="Escreva sua mensagem..." autocomplete="off" aria-label="Escreva sua mensagem" />
          <button type="submit" class="msg-chat__send" aria-label="Enviar mensagem">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </form>
      </div>
    </section>

  </main>

  <!-- =====================================================
       MODAL — Nova mensagem (iniciar conversa com conexões)
  ====================================================== -->
  <div class="msg-modal" id="new-conv-modal" hidden role="dialog" aria-modal="true" aria-labelledby="new-conv-title">
    <div class="msg-modal__overlay" id="new-conv-overlay"></div>
    <div class="msg-modal__dialog">
      <header class="msg-modal__header">
        <h2 class="msg-modal__title" id="new-conv-title">Nova mensagem</h2>
        <button type="button" class="msg-modal__close" id="new-conv-close" aria-label="Fechar">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </header>

      <p class="msg-modal__hint">Você pode conversar com pessoas que segue ou que seguem você.</p>

      <div class="msg-search msg-search--modal">
        <svg class="msg-search__icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="search" id="conn-search" class="msg-search__input" placeholder="Buscar conexões..." aria-label="Buscar conexões" />
      </div>

      <ul class="msg-conn-list" id="conn-list" aria-label="Conexões disponíveis">
        <li class="msg-loading" id="conn-loading">Carregando conexões...</li>
      </ul>
    </div>
  </div>

  <script src="../scripts/config.js"></script>
  <script src="../scripts/toast.js"></script>
  <script src="../scripts/sidebar.js"></script>
  <script src="../scripts/mensagens.js"></script>
  <script src="../scripts/mobile-sidebar.js"></script>
</body>
</html>
