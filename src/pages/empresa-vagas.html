<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gerenciar Vagas — Orbit</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Manrope:wght@700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="../styles/empresa-vagas.css" />
</head>
<body>

  <!-- =====================================================
       SIDEBAR EMPRESA
  ====================================================== -->
  <aside class="emp-sidebar" aria-label="Menu lateral da empresa">
    <a href="/pages/profile.html" class="emp-sidebar__brand emp-sidebar__brand--link" title="Ver meu perfil">
      <div class="emp-sidebar__logo-icon" aria-hidden="true">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="12" r="9" stroke="white" stroke-width="2"/>
          <circle cx="12" cy="12" r="3" fill="white"/>
          <path d="M3 12 Q7 6 12 12 Q17 18 21 12" stroke="white" stroke-width="1.5" fill="none"/>
        </svg>
      </div>
      <div class="emp-sidebar__brand-text">
        <span class="emp-sidebar__brand-name" id="sidebar-company-name">Orbit Corp</span>
        <span class="emp-sidebar__brand-sub">RECRUTAMENTO ATIVO</span>
      </div>
    </a>

    <nav class="emp-sidebar__nav" aria-label="Navegação da empresa">
      <a href="/pages/empresa-dashboard.html" class="emp-nav__link">
        <svg class="emp-nav__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        <span>Dashboard</span>
      </a>
      <a href="/pages/feed.html" class="emp-nav__link">
        <svg class="emp-nav__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span>Feed</span>
      </a>
      <a href="/pages/agenda.html" class="emp-nav__link">
        <svg class="emp-nav__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span>Agenda</span>
      </a>
      <a href="/pages/empresa-talentos.html" class="emp-nav__link">
        <svg class="emp-nav__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <span>Busca de Talentos</span>
      </a>
      <a href="/pages/empresa-vagas.html" class="emp-nav__link emp-nav__link--active" aria-current="page">
        <svg class="emp-nav__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
        <span>Gerenciar Vagas</span>
      </a>
      <a href="/pages/entrevistas.html" class="emp-nav__link">
        <svg class="emp-nav__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
        <span>Entrevistas</span>
      </a>
      <a href="/pages/mensagens.html" class="emp-nav__link">
        <svg class="emp-nav__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <span>Mensagens</span>
      </a>
    </nav>

    <div class="emp-sidebar__bottom">
      <div class="emp-sidebar__divider"></div>
      <button type="button" class="emp-nav__link emp-nav__link--btn" id="btn-logout">
        <svg class="emp-nav__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        <span>Sair</span>
      </button>
    </div>
  </aside>

  <!-- =====================================================
       CONTEÚDO — GERENCIAR VAGAS
  ====================================================== -->
  <main class="ev-main">

    <!-- Header da página -->
    <header class="ev-head">
      <div class="ev-head__text">
        <span class="ev-head__eyebrow">GESTÃO</span>
        <h1 class="ev-head__title">Gerenciar Vagas</h1>
        <p class="ev-head__subtitle">Publique vagas, acompanhe candidaturas e mova os melhores para entrevista.</p>
      </div>
      <div class="ev-head__actions">
        <select id="filter-status" class="ev-filter" aria-label="Filtrar vagas por status">
          <option value="">Todos os status</option>
          <option value="active">Publicadas</option>
          <option value="draft">Rascunhos</option>
          <option value="paused">Pausadas</option>
          <option value="closed">Encerradas</option>
        </select>
        <button type="button" class="ev-btn-primary" id="btn-new-job">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Nova Vaga
        </button>
      </div>
    </header>

    <!-- Faixa de resumo (global, não filtra) -->
    <section class="ev-summary" id="ev-summary" aria-label="Resumo das vagas">
      <div class="ev-summary__card"><span class="ev-summary__label">PUBLICADAS</span><span class="ev-summary__value" id="sum-active">0</span></div>
      <div class="ev-summary__card"><span class="ev-summary__label">RASCUNHOS</span><span class="ev-summary__value ev-summary__value--accent" id="sum-draft">0</span></div>
      <div class="ev-summary__card"><span class="ev-summary__label">CANDIDATURAS PENDENTES</span><span class="ev-summary__value ev-summary__value--accent" id="sum-pending">0</span></div>
      <div class="ev-summary__card"><span class="ev-summary__label">ENTREVISTAS ATIVAS</span><span class="ev-summary__value ev-summary__value--accent" id="sum-interviews">0</span></div>
    </section>

    <!-- Skeleton de carregamento -->
    <div class="ev-skeleton" id="ev-loading" aria-hidden="true">
      <div class="ev-skeleton__card"><div class="ev-skeleton__line ev-skeleton__line--title"></div><div class="ev-skeleton__line"></div><div class="ev-skeleton__line ev-skeleton__line--short"></div></div>
      <div class="ev-skeleton__card"><div class="ev-skeleton__line ev-skeleton__line--title"></div><div class="ev-skeleton__line"></div><div class="ev-skeleton__line ev-skeleton__line--short"></div></div>
      <div class="ev-skeleton__card"><div class="ev-skeleton__line ev-skeleton__line--title"></div><div class="ev-skeleton__line"></div><div class="ev-skeleton__line ev-skeleton__line--short"></div></div>
    </div>

    <!-- Lista de vagas -->
    <section class="ev-list" id="ev-list" aria-label="Suas vagas" hidden></section>
  </main>

  <!-- notifications.js é carregado pelo mobile-sidebar.js DEPOIS do sino existir -->
  <script src="../scripts/config.js"></script>
  <script src="../scripts/toast.js"></script>
  <script src="../scripts/empresa-vagas.js"></script>
  <script src="../scripts/orbit-select.js"></script>
  <script src="../scripts/mobile-sidebar.js"></script>
</body>
</html>
