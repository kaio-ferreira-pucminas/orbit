<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Perfil da Empresa — Orbit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles/empresa-perfil.css" />
</head>
<body>
  <div id="orbit-header"></div>

  <main class="emp-main">
    <div class="emp-loading" id="emp-loading">Carregando empresa…</div>

    <div class="emp-wrap" id="emp-content" hidden>
      <!-- Cabeçalho -->
      <section class="emp-hero">
        <div class="emp-hero__logo" id="emp-logo">?</div>
        <div class="emp-hero__info">
          <h1 class="emp-hero__name" id="emp-name">—</h1>
          <p class="emp-hero__industry" id="emp-industry">—</p>
          <p class="emp-hero__location" id="emp-location"></p>
          <a class="emp-hero__site" id="emp-site" href="#" target="_blank" rel="noopener" hidden>Visitar site</a>
        </div>
      </section>

      <!-- Sobre -->
      <section class="emp-section" id="emp-about-section">
        <h2 class="emp-section__title">Sobre a empresa</h2>
        <p class="emp-section__text" id="emp-about">—</p>
      </section>

      <!-- Vagas -->
      <section class="emp-section">
        <h2 class="emp-section__title">Vagas abertas <span class="emp-jobs__count" id="emp-jobs-count">0</span></h2>
        <div class="emp-jobs" id="emp-jobs"></div>
      </section>
    </div>
  </main>

  <script src="../scripts/config.js"></script>
  <script src="../scripts/header.js"></script>
  <script src="../scripts/empresa-perfil.js"></script>
</body>
</html>
