<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Perfil Público — Orbit</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="../styles/perfil-publico.css" />
</head>
<body>

  <!-- =====================================================
       HEADER (componente unificado — ver scripts/header.js)
  ====================================================== -->
  <div id="orbit-header"></div>

  <main class="pp-main">
    <div class="pp-loading" id="pp-loading">Carregando perfil...</div>

    <div class="pp-wrap" id="pp-content" hidden>

      <!-- ============ BANNER DE IDENTIDADE (largura cheia) ============ -->
      <section class="pp-banner">
        <div class="pp-banner__profile">
          <div class="pp-banner__avatar" id="pp-avatar"><span id="pp-initials">?</span></div>
          <div class="pp-banner__id">
            <h1 class="pp-banner__name" id="pp-name">—</h1>
            <p class="pp-banner__title" id="pp-title">—</p>
            <p class="pp-banner__location" id="pp-location">—</p>

            <div class="pp-banner__actions">
              <button type="button" class="pp-btn-primary" id="btn-follow">Seguir</button>
              <a class="pp-btn-ghost" id="btn-message" href="/pages/mensagens.html">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                Mensagem
              </a>
            </div>

            <div class="pp-banner__stats">
              <div class="pp-stat"><span class="pp-stat__value" id="pp-rating">—</span><span class="pp-stat__label">AVALIAÇÃO <span id="pp-reviews-count"></span></span></div>
              <div class="pp-stat"><span class="pp-stat__value" id="pp-connections">—</span><span class="pp-stat__label">CONEXÕES</span></div>
              <div class="pp-stat"><span class="pp-stat__value" id="pp-projects-count">—</span><span class="pp-stat__label">PROJETOS</span></div>
            </div>
          </div>
        </div>

        <div class="pp-banner__side">
          <div class="pp-avail-card">
            <span class="pp-avail-card__label">DISPONIBILIDADE</span>
            <span class="pp-avail-card__value" id="pp-avail-value">Mentoria Aberta</span>
            <span class="pp-avail-card__sub" id="pp-avail-sub">Disponível para novas conexões</span>
          </div>
          <div class="pp-pro-card">
            <span class="pp-pro-card__tag">ORBIT PRO</span>
            <span class="pp-pro-card__value">Membro Fundador</span>
            <span class="pp-pro-card__sub" id="pp-pro-sub">Na órbita desde Jan 2023</span>
          </div>
        </div>
      </section>

      <!-- ============ CORPO: 2 colunas ============ -->
      <div class="pp-body">
        <!-- Coluna esquerda (estreita) -->
        <div class="pp-col-left">
          <section class="pp-section">
            <h2 class="pp-section__title">Sobre</h2>
            <p class="pp-section__text" id="pp-about">—</p>
          </section>

          <section class="pp-section">
            <h2 class="pp-section__title">Habilidades</h2>
            <div class="pp-skills" id="pp-skills"></div>
          </section>

          <section class="pp-section pp-section--flush" id="pp-contrib-section" hidden>
            <div id="gc-pub"></div>
          </section>

          <section class="pp-section">
            <h2 class="pp-section__title">Depoimentos de Empresas</h2>
            <div class="pp-reviews" id="pp-reviews"></div>
          </section>
        </div>

        <!-- Coluna direita (larga) -->
        <div class="pp-col-right">
          <section class="pp-section pp-section--flush">
            <div class="pp-section__head">
              <h2 class="pp-section__title">Projetos em Destaque</h2>
              <a href="/pages/meus-projetos.html" class="pp-section__link">Ver todos</a>
            </div>
            <div class="pp-projects" id="pp-projects"></div>
          </section>
        </div>
      </div>

    </div>
  </main>

  <script src="../scripts/config.js"></script>
  <script src="../scripts/header.js"></script>
  <script src="../scripts/github-contrib.js"></script>
  <script src="../scripts/qa-reputation.js"></script>
  <script src="../scripts/perfil-publico.js"></script>
</body>
</html>
