<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Perfil Público — Orbit</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="../styles/perfil-publico.css" />
</head>
<body>

  <!-- =====================================================
       SIDEBAR ESQUERDA (usuário)
  ====================================================== -->
  <aside class="dash-sidebar" aria-label="Menu lateral">
    <div class="dash-sidebar__brand">
      <div class="dash-sidebar__logo-icon" aria-hidden="true">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="12" r="9" stroke="white" stroke-width="2"/>
          <circle cx="12" cy="12" r="3" fill="white"/>
          <path d="M3 12 Q7 6 12 12 Q17 18 21 12" stroke="white" stroke-width="1.5" fill="none"/>
        </svg>
      </div>
      <div class="dash-sidebar__brand-text">
        <span class="dash-sidebar__brand-name">Orbit</span>
        <span class="dash-sidebar__brand-sub">DEVELOPER PLATFORM</span>
      </div>
    </div>

    <nav class="dash-sidebar__nav" aria-label="Navegação principal">
      <a href="/pages/dashboard.html" class="dash-nav__link">
        <svg class="dash-nav__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        <span>Dashboard</span>
      </a>
      <a href="/pages/meus-projetos.html" class="dash-nav__link">
        <svg class="dash-nav__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        <span>Meus Projetos</span>
      </a>
      <a href="/pages/vagas.html" class="dash-nav__link">
        <svg class="dash-nav__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
        <span>Oportunidades</span>
      </a>
      <a href="/pages/mensagens.html" class="dash-nav__link">
        <svg class="dash-nav__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <span>Mensagens</span>
      </a>
    </nav>

    <div class="dash-sidebar__bottom">
      <!-- Sino de notificações (componente transversal #11) -->
      <div class="orbit-notif" id="orbit-notif">
        <button type="button" class="orbit-notif__btn" id="notif-btn" aria-label="Notificações" aria-haspopup="true" aria-expanded="false">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
          <span>Notificações</span>
          <span class="orbit-notif__badge" id="notif-badge" hidden>0</span>
        </button>
        <!-- dropdown injetado por notifications.js -->
      </div>
      <div class="dash-sidebar__divider"></div>
      <button type="button" class="dash-nav__link dash-nav__link--btn" id="btn-logout">
        <svg class="dash-nav__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        <span>Sair</span>
      </button>
    </div>
  </aside>

  <!-- =====================================================
       CONTEÚDO
  ====================================================== -->
  <main class="pp-main">
    <div class="pp-loading" id="pp-loading">Carregando perfil...</div>

    <div class="pp-grid" id="pp-content" hidden>
      <!-- Coluna esquerda: card de identidade -->
      <aside class="pp-sidebar-card">
        <div class="pp-id-card">
          <div class="pp-id-card__avatar" id="pp-avatar"><span id="pp-initials">?</span></div>
          <h1 class="pp-id-card__name" id="pp-name">—</h1>
          <p class="pp-id-card__title" id="pp-title">—</p>
          <p class="pp-id-card__location" id="pp-location">—</p>
          <div class="pp-id-card__actions">
            <button type="button" class="pp-btn-primary" id="btn-follow">Seguir</button>
            <a class="pp-btn-ghost" id="btn-message" href="/pages/mensagens.html">Mensagem</a>
          </div>
        </div>

        <div class="pp-stats">
          <div class="pp-stat"><span class="pp-stat__label">AVALIAÇÃO</span><span class="pp-stat__value" id="pp-rating">—</span><span class="pp-stat__sub" id="pp-reviews-count">—</span></div>
          <div class="pp-stat"><span class="pp-stat__label">CONEXÕES</span><span class="pp-stat__value" id="pp-connections">—</span></div>
          <div class="pp-stat"><span class="pp-stat__label">PROJETOS</span><span class="pp-stat__value" id="pp-projects-count">—</span></div>
        </div>

        <div class="pp-availability" id="pp-availability">
          <span class="pp-availability__label">DISPONIBILIDADE</span>
          <span class="pp-availability__value" id="pp-avail-value">Mentoria Aberta</span>
          <span class="pp-availability__sub" id="pp-avail-sub">Disponível para novas conexões</span>
        </div>
      </aside>

      <!-- Coluna direita: conteúdo -->
      <div class="pp-content">
        <section class="pp-section">
          <h2 class="pp-section__title">Sobre</h2>
          <p class="pp-section__text" id="pp-about">—</p>
        </section>

        <section class="pp-section">
          <h2 class="pp-section__title">Habilidades</h2>
          <div class="pp-skills" id="pp-skills"></div>
        </section>

        <section class="pp-section">
          <h2 class="pp-section__title">Depoimentos de Empresas</h2>
          <div class="pp-reviews" id="pp-reviews"></div>
        </section>

        <section class="pp-section">
          <div class="pp-section__head">
            <h2 class="pp-section__title">Projetos em Destaque</h2>
            <a href="/pages/meus-projetos.html" class="pp-section__link">Ver todos</a>
          </div>
          <div class="pp-projects" id="pp-projects"></div>
        </section>
      </div>
    </div>
  </main>

  <script src="../scripts/config.js"></script>
  <script src="../scripts/toast.js"></script>
  <script src="../scripts/notifications.js"></script>
  <script src="../scripts/perfil-publico.js"></script>
</body>
</html>
