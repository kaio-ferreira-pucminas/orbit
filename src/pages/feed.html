<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feed da Comunidade — Orbit</title>

  <!-- Fontes -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Manrope:wght@800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- Estilos -->
  <link rel="stylesheet" href="../styles/landing.css" />
  <link rel="stylesheet" href="../styles/feed.css" />
</head>
<body>

  <!-- =====================================================
       HEADER (componente unificado — ver scripts/header.js)
  ====================================================== -->
  <div id="orbit-header"></div>

  <!-- =====================================================
       MAIN — 3 colunas
  ====================================================== -->
  <main class="feed-main">
    <div class="feed-grid">

      <!-- ============ ASIDE ESQUERDO ============ -->
      <aside class="feed-aside feed-aside--left" aria-label="Perfil e atalhos">

        <!-- Profile Card -->
        <section class="profile-card">
          <div class="profile-card__cover"></div>
          <div class="profile-card__body">
            <div class="profile-card__avatar" id="profile-card-avatar">
              <span id="profile-card-initials">U</span>
            </div>
            <h2 class="profile-card__name" id="profile-card-name">Carregando...</h2>
            <p class="profile-card__title" id="profile-card-title">—</p>

            <div class="profile-card__stats">
              <div class="stat-row">
                <span class="stat-row__label">Vistas no perfil</span>
                <span class="stat-row__value">1.240</span>
              </div>
              <div class="stat-row">
                <span class="stat-row__label">Impressões do post</span>
                <span class="stat-row__value">4.892</span>
              </div>
            </div>
          </div>
        </section>

        <!-- Shortcuts (dinâmico + editável) -->
        <section class="aside-card">
          <div class="aside-card__head">
            <h3 class="aside-card__title">Meus Atalhos</h3>
            <button type="button" class="aside-card__edit" id="shortcuts-edit">Editar</button>
          </div>
          <nav class="aside-nav" id="shortcuts-list" aria-label="Atalhos"></nav>
          <form class="shortcut-add" id="shortcut-add" hidden>
            <input type="text" id="shortcut-input" class="shortcut-add__input" placeholder="Novo atalho (ex.: React)" maxlength="40" autocomplete="off" />
            <button type="submit" class="shortcut-add__btn">Adicionar</button>
          </form>
        </section>
      </aside>

      <!-- ============ FEED CENTRAL ============ -->
      <section class="feed-center" aria-label="Publicações">

        <!-- Composer -->
        <section class="composer" id="composer">
          <!-- Estado colapsado (botão simples) -->
          <div class="composer__collapsed" id="composer-collapsed">
            <div class="composer__avatar" id="composer-avatar">
              <span id="composer-initials">U</span>
            </div>
            <button class="composer__trigger" id="composer-trigger" type="button">
              Começar uma publicação...
            </button>
          </div>

          <!-- Estado expandido (editor completo) -->
          <div class="composer__expanded composer__expanded--hidden" id="composer-expanded">
            <div class="composer__type" role="tablist" aria-label="Tipo de publicação">
              <button type="button" class="composer__type-btn is-active" data-ctype="post" role="tab">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                Publicação
              </button>
              <button type="button" class="composer__type-btn" data-ctype="duvida" role="tab">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                Dúvida
              </button>
            </div>

            <input type="text" id="composer-title" class="composer__title-input composer__title-input--hidden"
              placeholder="Título da sua dúvida (ex.: Como centralizar uma div com flexbox?)" maxlength="160" />

            <div class="composer__toolbar" role="toolbar" aria-label="Formatação">
              <button type="button" class="composer__btn" data-format="bold"
                title="Negrito (envolve em **)" aria-label="Negrito">
                <strong>B</strong>
              </button>
              <button type="button" class="composer__btn" data-format="italic"
                title="Itálico (envolve em *)" aria-label="Itálico">
                <em>I</em>
              </button>
              <button type="button" class="composer__btn" data-format="code"
                title="Código inline (envolve em `)" aria-label="Código inline">
                &lt;/&gt;
              </button>
              <button type="button" class="composer__btn" data-format="codeblock"
                title="Bloco de código (envolve em ```)" aria-label="Bloco de código">
                { }
              </button>
              <button type="button" class="composer__btn" data-format="link"
                title="Link [texto](url)" aria-label="Link">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
                  fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
                  <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
                </svg>
              </button>
            </div>

            <textarea
              id="composer-textarea"
              class="composer__textarea"
              placeholder="Compartilhe algo com a comunidade..."
              rows="5"
              maxlength="5000"></textarea>

            <div class="composer__preview composer__preview--hidden" id="composer-preview"
              aria-live="polite"></div>

            <div class="composer__footer">
              <button type="button" class="composer__preview-toggle" id="composer-preview-toggle">
                Pré-visualizar
              </button>
              <div class="composer__actions">
                <button type="button" class="composer__cancel" id="composer-cancel">Cancelar</button>
                <button type="button" class="composer__submit" id="composer-submit">Publicar</button>
              </div>
            </div>
          </div>
        </section>

        <!-- Lista de posts -->
        <div class="post-feed" id="post-feed" aria-live="polite">
          <!-- Posts injetados via feed.js -->
          <div class="post-feed__loading" id="post-feed-loading">Carregando publicações...</div>
        </div>
      </section>

      <!-- ============ ASIDE DIREITO ============ -->
      <aside class="feed-aside feed-aside--right" aria-label="Tópicos e sugestões">

        <!-- Trending Topics -->
        <section class="aside-card">
          <h3 class="aside-card__title">Tópicos em Alta</h3>
          <div class="trending-list" id="trending-list">
            <p class="trending-empty">Carregando tópicos...</p>
          </div>
          <button type="button" class="aside-card__cta">Ver mais tópicos</button>
        </section>

        <!-- Sugestões -->
        <section class="aside-card">
          <h3 class="aside-card__title">Sugestões para você</h3>
          <div class="suggestions" id="suggestions-list">
            <!-- Populado via feed.js -->
          </div>
        </section>

        <!-- Footer -->
        <footer class="aside-footer">
          <ul class="aside-footer__links">
            <li><a href="#">Privacy</a></li>
            <li><a href="#">Terms</a></li>
            <li><a href="#">Help Center</a></li>
            <li><a href="#">Accessibility</a></li>
          </ul>
          <p class="aside-footer__copy">© 2026 Orbit Cosmic Systems</p>
        </footer>
      </aside>

    </div>
  </main>

  <!-- Scripts -->
  <script src="../scripts/config.js"></script>
  <script src="../scripts/header.js"></script>
  <script src="../scripts/feed.js"></script>
</body>
</html>
